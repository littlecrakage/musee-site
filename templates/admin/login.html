<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    body { background: #FFF3D6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  </style>
</head>
<body>
  <div class="admin-login-card">
    <div class="admin-login-bear">🐻</div>
    <h1>Espace Admin</h1>
    <p>Musée Petit Ours Brun</p>

    {% if error %}
    <div class="admin-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autofocus required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Se connecter</button>
    </form>
    <a href="{{ url_for('index') }}" class="admin-back-link">← Retour au site</a>
  </div>
</body>
</html>
